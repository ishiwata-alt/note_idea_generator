<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note記事アイデアジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; font-feature-settings: "liga" 0, "clig" 0; }

  body {
    font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 50%, #f8bbd0 100%);
    min-height: 100vh;
    padding: 24px 16px 60px;
    color: #5d4037;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 32px; }
  header .icon { font-size: 48px; margin-bottom: 8px; }
  header h1 { font-size: 22px; font-weight: 700; color: #ad1457; letter-spacing: .5px; }
  header p { font-size: 13px; color: #b76e79; margin-top: 6px; }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(173, 20, 87, .08);
    margin-bottom: 24px;
  }

  /* ── Form ── */
  label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #ad1457; }
  label .sub { font-weight: 400; font-size: 12px; color: #b76e79; }

  input[type="text"] {
    width: 100%; padding: 12px 16px; border: 2px solid #f8bbd0; border-radius: 12px;
    font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; background: #fffafa;
  }
  input[type="text"]:focus { border-color: #ec407a; }
  input[type="text"]::placeholder { color: #e0a0b0; }
  .field { margin-bottom: 20px; }

  /* ── Radio / Toggle buttons ── */
  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-group input[type="radio"] { display: none; }
  .radio-group label.radio {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
    border: 2px solid #f8bbd0; border-radius: 40px; font-size: 14px; font-weight: 500;
    color: #ad1457; cursor: pointer; transition: all .2s; background: #fffafa; user-select: none;
  }
  .radio-group label.radio:hover { background: #fce4ec; }
  .radio-group input[type="radio"]:checked + label.radio {
    background: linear-gradient(135deg, #f48fb1, #ec407a); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px rgba(236, 64, 122, .3);
  }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex; gap: 0; margin-bottom: 20px; border-radius: 14px; overflow: hidden;
    border: 2px solid #f48fb1; background: #fff;
  }
  .mode-toggle button {
    flex: 1; padding: 12px 8px; border: none; border-radius: 0; font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s;
    background: #fff; color: #ad1457; box-shadow: none; letter-spacing: 0;
  }
  .mode-toggle button:hover { background: #fce4ec; transform: none; box-shadow: none; }
  .mode-toggle button.active {
    background: linear-gradient(135deg, #f48fb1, #ec407a); color: #fff;
  }

  /* ── Button ── */
  .btn-wrap { text-align: center; margin-top: 8px; }
  button {
    font-family: inherit; font-size: 16px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #f06292, #ec407a); border: none; border-radius: 40px;
    padding: 14px 48px; cursor: pointer; transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(236, 64, 122, .3); letter-spacing: .5px;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(236, 64, 122, .4); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  button.btn-sm { font-size: 13px; padding: 8px 20px; border-radius: 30px; box-shadow: 0 2px 8px rgba(236, 64, 122, .2); }
  button.btn-outline { background: #fff; color: #ec407a; border: 2px solid #f48fb1; box-shadow: none; }
  button.btn-outline:hover { background: #fce4ec; box-shadow: none; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px 0; display: none; }
  .loading.show { display: block; }
  .dots span {
    display: inline-block; width: 10px; height: 10px; margin: 0 4px;
    background: #f06292; border-radius: 50%; animation: bounce .6s infinite alternate;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { transform: translateY(-12px); opacity: .4; } }
  .loading p { margin-top: 12px; font-size: 13px; color: #b76e79; }

  /* ── Results ── */
  #results, #seriesResults, #seriesArticleView { display: none; }
  #seriesArticleView.show { display: block; }
  #results.show, #seriesResults.show { display: block; }

  .result-header { text-align: center; margin-bottom: 20px; }
  .result-header h2 { font-size: 18px; color: #ad1457; }
  .result-header p { font-size: 13px; color: #b76e79; margin-top: 4px; }

  .article-card {
    background: #fff; border-radius: 16px; padding: 22px 20px; margin-bottom: 16px;
    box-shadow: 0 2px 16px rgba(173, 20, 87, .06); border-left: 4px solid #f48fb1;
    transition: transform .15s;
  }
  .article-card:hover { transform: translateY(-2px); }
  .article-card .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .article-card .num {
    display: inline-block; background: linear-gradient(135deg, #f48fb1, #ec407a);
    color: #fff; font-size: 12px; font-weight: 700; width: 24px; height: 24px;
    line-height: 24px; text-align: center; border-radius: 50%; flex-shrink: 0;
  }
  .article-card h3 { font-size: 16px; font-weight: 700; color: #880e4f; margin-bottom: 12px; line-height: 1.5; }
  .article-card ul { list-style: none; padding: 0; }
  .article-card li {
    position: relative; padding: 6px 0 6px 20px; font-size: 14px; line-height: 1.6; color: #5d4037;
  }
  .article-card li::before {
    content: ''; position: absolute; left: 0; top: 13px;
    width: 8px; height: 8px; background: #f8bbd0; border-radius: 50%;
  }
  .article-card .write-btn-wrap { text-align: right; margin-top: 12px; }
  .btn-wrap.retry { margin-top: 24px; }

  /* ── Article view ── */
  #articleView { display: none; }
  #articleView.show { display: block; }

  .article-view-card {
    background: #fff; border-radius: 20px; padding: 32px 24px;
    box-shadow: 0 4px 24px rgba(173, 20, 87, .08); margin-bottom: 24px;
  }
  .article-view-card h2 {
    font-size: 20px; font-weight: 700; color: #880e4f; line-height: 1.6;
    margin-bottom: 24px; text-align: center; padding-bottom: 16px; border-bottom: 2px dashed #f8bbd0;
  }
  .article-section { margin-bottom: 28px; }
  .article-section h3 {
    font-size: 16px; font-weight: 700; color: #ad1457; margin-bottom: 12px;
    padding-left: 14px; border-left: 4px solid #f48fb1; line-height: 1.5;
  }
  .article-section .body-text { font-size: 15px; line-height: 2; color: #5d4037; white-space: pre-wrap; }

  .paywall-divider {
    text-align: center; margin: 32px 0; padding: 20px;
    background: linear-gradient(135deg, #fce4ec, #fff0f5); border-radius: 16px; border: 2px dashed #f48fb1;
  }
  .paywall-divider .lock { font-size: 32px; margin-bottom: 8px; }
  .paywall-divider p { font-size: 14px; font-weight: 700; color: #ad1457; }
  .paywall-divider .note { font-size: 12px; font-weight: 400; color: #b76e79; margin-top: 4px; }

  .article-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }

  .copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #ad1457; color: #fff; padding: 12px 28px; border-radius: 40px;
    font-size: 14px; font-weight: 700; opacity: 0; transition: all .3s; pointer-events: none; z-index: 100;
  }
  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Series mode styles ── */
  .series-magazine {
    background: linear-gradient(135deg, #fce4ec, #fff0f5); border-radius: 20px;
    padding: 24px 20px; margin-bottom: 24px; text-align: center;
    border: 2px solid #f48fb1;
  }
  .series-magazine .mag-icon { font-size: 36px; margin-bottom: 8px; }
  .series-magazine h2 { font-size: 18px; color: #880e4f; margin-bottom: 8px; line-height: 1.5; }
  .series-magazine .mag-desc { font-size: 14px; color: #5d4037; line-height: 1.8; }

  .series-card {
    background: #fff; border-radius: 16px; padding: 22px 20px; margin-bottom: 16px;
    box-shadow: 0 2px 16px rgba(173, 20, 87, .06); transition: transform .15s;
  }
  .series-card:hover { transform: translateY(-2px); }
  .series-card .series-card-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .series-card .ep-num {
    display: inline-block; background: linear-gradient(135deg, #f48fb1, #ec407a);
    color: #fff; font-size: 11px; font-weight: 700; padding: 4px 12px;
    border-radius: 20px; flex-shrink: 0;
  }
  .series-card .ep-num.free { background: linear-gradient(135deg, #81c784, #43a047); }
  .series-card .ep-num.premium { background: linear-gradient(135deg, #f48fb1, #ec407a); }
  .series-card .ep-num.final { background: linear-gradient(135deg, #ffb74d, #f57c00); }
  .series-card .price-tag {
    font-size: 12px; font-weight: 700; color: #ad1457; background: #fce4ec;
    padding: 3px 10px; border-radius: 12px;
  }
  .series-card .price-tag.free-tag { color: #2e7d32; background: #e8f5e9; }
  .series-card h3 { font-size: 15px; font-weight: 700; color: #880e4f; margin-bottom: 10px; line-height: 1.5; }
  .series-card .overview { font-size: 13px; color: #5d4037; line-height: 1.7; margin-bottom: 10px; }
  .series-card ul { list-style: none; padding: 0; margin-bottom: 10px; }
  .series-card li {
    position: relative; padding: 4px 0 4px 18px; font-size: 13px; line-height: 1.6; color: #5d4037;
  }
  .series-card li::before {
    content: ''; position: absolute; left: 0; top: 11px;
    width: 7px; height: 7px; background: #f8bbd0; border-radius: 50%;
  }

  .导线-box, .导线-box-paywall, .series-导线 {
    background: #fff9f0; border-radius: 12px; padding: 14px 16px; margin-top: 12px;
    border: 1px solid #ffe0b2;
  }

  .cta-box {
    background: #fff9f0; border-radius: 12px; padding: 14px 16px; margin-top: 12px;
    border: 1px solid #ffe0b2;
  }
  .cta-box .cta-label {
    font-size: 11px; font-weight: 700; color: #e65100; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .cta-box .cta-text { font-size: 13px; color: #5d4037; line-height: 1.7; }

  .paywall-suggestion {
    background: linear-gradient(135deg, #fce4ec, #fff0f5); border-radius: 12px;
    padding: 14px 16px; margin-top: 12px; border: 2px dashed #f48fb1;
  }
  .paywall-suggestion .pw-label {
    font-size: 11px; font-weight: 700; color: #ad1457; margin-bottom: 4px;
  }
  .paywall-suggestion .pw-text { font-size: 13px; color: #880e4f; line-height: 1.7; }

  .series-connector {
    text-align: center; padding: 8px 0; color: #f48fb1; font-size: 20px;
  }

  footer { text-align: center; margin-top: 40px; font-size: 11px; color: #c9929e; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="icon">&#x1F4DD;</div>
    <h1>note記事アイデアジェネレーター</h1>
    <p>テーマと対象読者を選ぶだけで、有料記事のアイデアを生成します</p>
  </header>

  <!-- Form -->
  <div class="card" id="formCard">
    <!-- Mode toggle -->
    <div class="field">
      <label>モードを選択</label>
      <div class="mode-toggle">
        <button class="active" id="modeBtn-single" onclick="setMode('single')">&#x1F4C4; 単発記事モード</button>
        <button id="modeBtn-series" onclick="setMode('series')">&#x1F4DA; シリーズ設計モード</button>
      </div>
    </div>

    <div class="field">
      <label>テーマを入力 <span class="sub">（例：AI活用、フリーランス1年目）</span></label>
      <input type="text" id="theme" placeholder="例：Canvaデザイン術">
    </div>

    <div class="field">
      <label>対象読者を選んでください</label>
      <div class="radio-group">
        <input type="radio" name="audience" id="a1" value="ママ向け" checked>
        <label class="radio" for="a1">&#x1F469;&#x200D;&#x1F37C; ママ向け</label>
        <input type="radio" name="audience" id="a2" value="経営者向け">
        <label class="radio" for="a2">&#x1F4BC; 経営者向け</label>
        <input type="radio" name="audience" id="a3" value="フリーランス志望向け">
        <label class="radio" for="a3">&#x2728; フリーランス志望向け</label>
        <input type="radio" name="audience" id="a4" value="副業初心者向け">
        <label class="radio" for="a4">&#x1F4B0; 副業初心者向け</label>
        <input type="radio" name="audience" id="a5" value="クリエイター向け">
        <label class="radio" for="a5">&#x1F3A8; クリエイター向け</label>
        <input type="radio" name="audience" id="a6" value="会社員向け">
        <label class="radio" for="a6">&#x1F3E2; 会社員向け</label>
      </div>
    </div>

    <div class="btn-wrap">
      <button id="generateBtn" onclick="handleGenerate()">アイデアを生成する</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <p id="loadingText">アイデアを考えています...</p>
  </div>

  <!-- Single mode results -->
  <div id="results">
    <div class="result-header">
      <h2>&#x1F389; 記事アイデア 3選</h2>
      <p id="resultMeta"></p>
    </div>
    <div id="articleList"></div>
    <div class="btn-wrap retry">
      <button onclick="handleGenerate()">もう一度生成する</button>
    </div>
  </div>

  <!-- Article full view (single mode) -->
  <div id="articleView">
    <div class="article-view-card">
      <h2 id="articleViewTitle"></h2>
      <div id="articleViewBody"></div>
      <div class="article-actions">
        <button class="btn-sm" onclick="copyArticle()">&#x1F4CB; 本文をコピー</button>
        <button class="btn-sm btn-outline" onclick="backToResults()">&#x2190; アイデア一覧に戻る</button>
      </div>
    </div>
  </div>

  <!-- Article full view (series mode) -->
  <div id="seriesArticleView">
    <div class="article-view-card">
      <h2 id="seriesArticleViewTitle"></h2>
      <div id="seriesArticleViewBody"></div>
      <div class="article-actions">
        <button class="btn-sm" onclick="copySeriesArticle()">&#x1F4CB; 本文をコピー</button>
        <button class="btn-sm btn-outline" onclick="backToSeriesResults()">&#x2190; シリーズ一覧に戻る</button>
      </div>
    </div>
  </div>

  <!-- Series mode results -->
  <div id="seriesResults">
    <div id="seriesContent"></div>
    <div class="article-actions" style="margin-bottom:24px">
      <button class="btn-sm" onclick="copySeriesPlan()">&#x1F4CB; シリーズ構成をコピー</button>
      <button class="btn-sm btn-outline" onclick="backToForm()">&#x2190; 入力に戻る</button>
    </div>
    <div class="btn-wrap retry">
      <button onclick="handleGenerate()">もう一度生成する</button>
    </div>
  </div>

</div>

<div class="copy-toast" id="copyToast">コピーしました！</div>
<footer>&copy; note記事アイデアジェネレーター</footer>

<script>
// ── Mode state ──
let currentMode = 'single';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeBtn-single').classList.toggle('active', mode === 'single');
  document.getElementById('modeBtn-series').classList.toggle('active', mode === 'series');
  // update button label
  document.getElementById('generateBtn').textContent =
    mode === 'single' ? 'アイデアを生成する' : 'シリーズ構成を生成する';
}

function handleGenerate() {
  if (currentMode === 'single') generate();
  else generateSeries();
}

// ── Single-article templates ──

      ["この記事を書いた背景", "{theme}が経営に与えるインパクトをデータで解説", "なぜ「とりあえず導入」は失敗するのか", "投資対効果を最大化する3つの判断基準", "導入企業のリアルな声｜成功と失敗の分かれ目", "チェックリスト：自社に{theme}は必要か？"],

// ── Utility ──
function getAudience() {
  return document.querySelector('input[name="audience"]:checked').value;
}
function pickRandom(arr, count) {
  const shuffled = [...arr].sort(() => Math.random() - .5);
  return shuffled.slice(0, count || 1);
}
function pick1(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function T(str, theme) { return str.replace(/\{theme\}/g, theme); }

function showToast(msg) {
  const toast = document.getElementById('copyToast');
  toast.textContent = msg || 'コピーしました！';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function hideAllViews() {
  ['results', 'articleView', 'seriesResults', 'seriesArticleView'].forEach(id =>
    document.getElementById(id).classList.remove('show')
  );
}

function backToForm() {
  hideAllViews();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Single article mode ──
let generatedArticles = [];

function generate() {
  const theme = document.getElementById('theme').value.trim();
  if (!theme) {
    document.getElementById('theme').focus();
    document.getElementById('theme').style.borderColor = '#e91e63';
    setTimeout(() => document.getElementById('theme').style.borderColor = '#f8bbd0', 1500);
    return;
  }

  const audience = getAudience();
  const data = templates[audience];

  const btn = document.getElementById('generateBtn');
  const loading = document.getElementById('loading');

  btn.disabled = true;
  hideAllViews();
  document.getElementById('loadingText').textContent = 'アイデアを考えています...';
  loading.classList.add('show');

  setTimeout(() => {
    const chosenTitles = pickRandom(data.titles, 3);
    const chosenHeadings = pickRandom(data.headings, 3);

    generatedArticles = [];
    let html = '';

    chosenTitles.forEach((t, i) => {
      const title = t.replace(/\{theme\}/g, theme);
      const heads = chosenHeadings[i].map(h => h.replace(/\{theme\}/g, theme));
      generatedArticles.push({ title, headings: heads, audience, theme });

      html += `
        <div class="article-card">
          <div class="card-top"><span class="num">${i + 1}</span></div>
          <h3>${title}</h3>
          <ul>${heads.map(h => `<li>${h}</li>`).join('')}</ul>
          <div class="write-btn-wrap">
            <button class="btn-sm" onclick="writeArticle(${i})">&#x270D;&#xFE0F; この記事を書く</button>
          </div>
        </div>`;
    });

    document.getElementById('resultMeta').textContent = `テーマ「${theme}」× ${audience}`;
    document.getElementById('articleList').innerHTML = html;

    loading.classList.remove('show');
    document.getElementById('results').classList.add('show');
    btn.disabled = false;
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 1200);
}

// ── Write single article ──
function generateBody(article) {
  const { title, headings, audience, theme } = article;
  const tmpl = bodyTemplates[audience];
  // New paywall: free = empathy(0) + problem(1), paid = solution(2) onwards
  // Cut after index 1 so "continue reading" hits right when solution starts
  const paywallAfter = 2;
  let sections = [];

  // Map heading index to article structure role
  // 0: empathy/intro, 1: problem, 2: solution, 3: experience, 4: experience/deep, 5: closing
  headings.forEach((heading, idx) => {
    let category;
    if (idx === 0) category = 'intro';
    else if (idx === 1) category = 'middle'; // problem section
    else if (idx === headings.length - 1) category = 'closing';
    else if (heading.includes('スケジュール') || heading.includes('タイム') || heading.includes('プラン') || heading.includes('手順') || heading.includes('ステップ') || heading.includes('導入') || heading.includes('カリキュラム'))
      category = 'schedule';
    else if (idx === 2 || idx === 3) category = 'deep'; // solution + experience
    else category = 'middle';

    const pool = tmpl[category] || tmpl['middle'] || tmpl['deep'];
    const text = pool[Math.floor(Math.random() * pool.length)];
    sections.push({ heading, body: text.replace(/\{theme\}/g, theme), isPaid: idx >= paywallAfter });
  });
  return sections;
}

function writeArticle(index) {
  const article = generatedArticles[index];
  if (!article) return;

  hideAllViews();
  const loading = document.getElementById('loading');
  document.getElementById('loadingText').textContent = '記事を執筆しています...';
  loading.classList.add('show');

  setTimeout(() => {
    const sections = generateBody(article);
    let paywallInserted = false;
    let bodyHtml = '';

    // Build the paid headings preview for the paywall teaser
    const paidHeadings = sections.filter(s => s.isPaid).map(s => s.heading);
    const teaserList = paidHeadings.length ? paidHeadings.map(h => '- ' + h).join('<br>') : '';

    sections.forEach((sec) => {
      if (sec.isPaid && !paywallInserted) {
        paywallInserted = true;
        bodyHtml += `
          <div class="paywall-divider">
            <div class="lock">&#x1F512;</div>
            <p>ここから先は有料パートです</p>
            <div class="note" style="margin-top:8px;text-align:left;font-size:13px;line-height:1.8">
              ここから先では、具体的な解決策・実際のステップ・テンプレートなどをすべて公開しています。<br><br>
              <strong>有料パートの内容：</strong><br>
              ${teaserList}<br><br>
              <span style="color:#ad1457">（noteでは「ここから有料」ラインをこの位置に設定します）</span>
            </div>
          </div>`;
      }
      bodyHtml += `
        <div class="article-section">
          <h3>${sec.heading}</h3>
          <div class="body-text">${sec.body}</div>
        </div>`;
    });

    document.getElementById('articleViewTitle').textContent = article.title;
    document.getElementById('articleViewBody').innerHTML = bodyHtml;

    let plainText = article.title + '\n\n';
    sections.forEach((sec, i) => {
      if (sec.isPaid && !sections[i-1]?.isPaid) plainText += '\n---（ここから有料）---\n\n';
      plainText += '## ' + sec.heading + '\n\n' + sec.body + '\n\n';
    });
    document.getElementById('articleView').dataset.plainText = plainText;

    loading.classList.remove('show');
    document.getElementById('articleView').classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 2000);
}

}

function copyArticle() {

}

let seriesPlainText = '';
let generatedSeriesArticles = [];

function generateSeries() {
  const theme = document.getElementById('theme').value.trim();
  if (!theme) {
    document.getElementById('theme').focus();
    document.getElementById('theme').style.borderColor = '#e91e63';
    setTimeout(() => document.getElementById('theme').style.borderColor = '#f8bbd0', 1500);
    return;
  }

  const audience = getAudience();
  const st = seriesTemplates[audience];

  const btn = document.getElementById('generateBtn');
  const loading = document.getElementById('loading');

  btn.disabled = true;
  hideAllViews();
  document.getElementById('loadingText').textContent = 'シリーズ構成を設計しています...';
  loading.classList.add('show');

  setTimeout(() => {
    const magazine = pick1(st.magazines);
    const prices = ['無料', '¥980', '¥980', '¥980', '¥1,980'];
    const epLabels = ['第1回（無料・集客用）', '第2回（有料）', '第3回（有料）', '第4回（有料）', '第5回（まとめ・有料）'];
    const epClasses = ['free', 'premium', 'premium', 'premium', 'final'];
    const priceTagClasses = ['free-tag', '', '', '', ''];

    let html = '';
    seriesPlainText = '';
    generatedSeriesArticles = [];

    // Magazine header
    const magTitle = T(magazine.title, theme);
    const magDesc = T(magazine.desc, theme);
    html += `
      <div class="series-magazine">
        <div class="mag-icon">&#x1F4DA;</div>
        <h2>${magTitle}</h2>
        <div class="mag-desc">${magDesc}</div>
      </div>`;

    seriesPlainText += `=== マガジン ===\n${magTitle}\n\n${magDesc}\n\n`;

    // Each article
    st.articles.forEach((art, i) => {
      const title = T(pick1(art.titles), theme);
      const overview = T(pick1(art.overviews), theme);
      const headings = pick1(art.headings).map(h => T(h, theme));

      // connector arrow between cards
      if (i > 0) {
        html += `<div class="series-connector">&#x25BC;</div>`;
      }

      html += `<div class="series-card">`;
      html += `<div class="series-card-header">
        <span class="ep-num ${epClasses[i]}">${epLabels[i]}</span>
        <span class="price-tag ${priceTagClasses[i]}">${prices[i]}</span>
      </div>`;
      html += `<h3>${title}</h3>`;
      html += `<div class="overview">${overview}</div>`;
      html += `<ul>${headings.map(h => `<li>${h}</li>`).join('')}</ul>`;

      // Store for writeSeriesArticle
      generatedSeriesArticles.push({ title, headings, overview, audience, theme, isFree: i === 0, isFinal: i === 4, episodeLabel: epLabels[i], price: prices[i] });

      // Write button
      html += `<div class="write-btn-wrap" style="text-align:right;margin-top:12px;">
        <button class="btn-sm" onclick="writeSeriesArticle(${i})">&#x270D;&#xFE0F; この記事を書く</button>
      </div>`;

      seriesPlainText += `--- ${epLabels[i]}（${prices[i]}）---\n`;
      seriesPlainText += `${title}\n\n`;
      seriesPlainText += `概要：${overview}\n\n`;
      seriesPlainText += `見出し構成：\n${headings.map(h => '  - ' + h).join('\n')}\n\n`;

      // Free article: paywall suggestion + CTA
      if (i === 0 && art.paywallTexts) {
        const pwHeading = headings.find(h => h.includes('無料パート')) || headings[2];
        const paywallText = T(pick1(art.paywallTexts), theme);
        html += `
          <div class="paywall-suggestion">
            <div class="pw-label">&#x1F512; 有料ラインの提案</div>
            <div class="pw-text">「${pwHeading}」の後ろで有料ラインを引くのがおすすめです。\n無料パートで価値を感じてもらい、「もっと知りたい」を引き出しましょう。</div>
          </div>`;
        html += `
          <div class="cta-box">
            <div class="cta-label">&#x1F4E3; 有料記事への誘導文（案）</div>
            <div class="cta-text">${paywallText}</div>
          </div>`;

        seriesPlainText += `有料ライン：「${pwHeading}」の後ろで設定\n\n`;
        seriesPlainText += `誘導文：\n${paywallText}\n\n`;
      }

      // Next article CTA (except last)
      if (i < 4) {
        const nextText = T(st.nextArticleTexts[i], theme);
        html += `
          <div class="cta-box">
            <div class="cta-label">&#x27A1;&#xFE0F; 次の記事への導線文</div>
            <div class="cta-text">${nextText}</div>
          </div>`;
        seriesPlainText += `次の記事への導線：\n${nextText}\n\n`;
      }

      html += `</div>`;
    });

    document.getElementById('seriesContent').innerHTML = html;

    loading.classList.remove('show');
    document.getElementById('seriesResults').classList.add('show');
    btn.disabled = false;
    document.getElementById('seriesResults').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 1800);
}

function writeSeriesArticle(index) {
  const article = generatedSeriesArticles[index];
  if (!article) return;

  hideAllViews();
  const loading = document.getElementById('loading');
  document.getElementById('loadingText').textContent = `第${index + 1}回の記事を執筆しています...`;
  loading.classList.add('show');

  setTimeout(() => {
    const { title, headings, audience, theme, isFree, isFinal, episodeLabel, price } = article;
    const pool = seriesBodyPool[audience];

    let bodyHtml = '';
    let plainText = `${episodeLabel}（${price}）\n${title}\n\n`;

    // Determine paywall position for free article
    const paywallIdx = isFree ? headings.findIndex(h => h.includes('無料パート')) : -1;
    let paywallInserted = false;

    headings.forEach((heading, idx) => {
      // Insert paywall divider for free article
      if (isFree && !paywallInserted && paywallIdx >= 0 && idx > paywallIdx) {
        paywallInserted = true;
        bodyHtml += `
          <div class="paywall-divider">
            <div class="lock">&#x1F512;</div>
            <p>ここから先は有料パートです</p>
            <div class="note">（noteでは「ここから有料」ラインを設定できます）</div>
          </div>`;
        plainText += '\n---（ここから有料）---\n\n';
      }

      // Select body text by heading context
      let body;
      const h = heading.toLowerCase();

      if (idx === 0) {
        // First heading: intro or recap
        if (h.includes('前回') || h.includes('振り返') || h.includes('おさらい') || h.includes('おさらい')) {
          body = pick1(pool.recap || pool.intro);
        } else if (isFinal) {
          body = pick1(pool.summary || pool.intro);
        } else {
          body = pick1(pool.intro);
        }
      } else if (idx === headings.length - 1) {
        // Last heading
        if (h.includes('次回') || h.includes('予告') || h.includes('案内') || h.includes('紹介')) {
          body = pick1(pool.finalMessage || pool.recap);
        } else {
          body = pick1(pool.finalMessage);
        }
      } else if (h.includes('チェックリスト') || h.includes('保存版') || h.includes('ロードマップ') || h.includes('まとめ') || h.includes('総まとめ')) {
        body = pick1(pool.checklist || pool.practical);
      } else if (h.includes('ツール') || h.includes('サービス') || h.includes('教材') || h.includes('環境') || h.includes('リソース') || h.includes('選定')) {
        body = pick1(pool.tools || pool.practical);
      } else if (h.includes('収益') || h.includes('案件') || h.includes('稼') || h.includes('お金') || h.includes('提案') || h.includes('営業') || h.includes('roi') || h.includes('ROI') || h.includes('投資') || h.includes('試算')) {
        body = pick1(pool.monetize || pool.practical);
      } else if (h.includes('ステップアップ') || h.includes('単価') || h.includes('成長') || h.includes('差別化') || h.includes('改善') || h.includes('pdca') || h.includes('PDCA') || h.includes('独立') || h.includes('退職') || h.includes('準備') || h.includes('手続') || h.includes('資金')) {
        body = pick1(pool.levelup || pool.practical);
      } else if (h.includes('特別') || h.includes('付録') || h.includes('テンプレート') || h.includes('限定') || h.includes('q&a') || h.includes('Q&A') || h.includes('質問')) {
        body = pick1(pool.checklist || pool.practical);
      } else if (h.includes('成功') || h.includes('エピソード') || h.includes('事例') || h.includes('メッセージ') || h.includes('おわり') || h.includes('最後')) {
        body = pick1(pool.finalMessage);
      } else {
        body = pick1(pool.practical);
      }

      body = T(body, theme);

      bodyHtml += `
        <div class="article-section">
          <h3>${heading}</h3>
          <div class="body-text">${body}</div>
        </div>`;
      plainText += `## ${heading}\n\n${body}\n\n`;
    });

    document.getElementById('seriesArticleViewTitle').textContent = title;
    document.getElementById('seriesArticleViewBody').innerHTML = bodyHtml;
    document.getElementById('seriesArticleView').dataset.plainText = plainText;

    loading.classList.remove('show');
    document.getElementById('seriesArticleView').classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 2000);
}

function backToSeriesResults() {
  document.getElementById('seriesArticleView').classList.remove('show');
  document.getElementById('seriesResults').classList.add('show');
  document.getElementById('seriesResults').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copySeriesArticle() {
  const text = document.getElementById('seriesArticleView').dataset.plainText;
  navigator.clipboard.writeText(text).then(() => showToast());
}

// Enter key
document.getElementById('theme').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleGenerate();
});
